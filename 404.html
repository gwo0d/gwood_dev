<!doctype html>
<html lang="en" data-bs-theme="auto">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<title>404 - Not Found</title>
		<meta name="description" content="Page not found" />
		<meta name="robots" content="noindex, follow" />

		<link
			rel="icon"
			id="favicon"
			type="image/svg+xml"
			href="/favicon-light.svg"
		/>

		<script src="/theme-init.js" data-cfasync="false"></script>
	</head>

	<body>
		<main class="container d-flex flex-column min-vh-100 text-center">
			<div
				class="flex-grow-1 d-flex flex-column align-items-center justify-content-center"
			>
				<h1 class="display-1 mb-2">404</h1>
				<p class="lead mb-4">Nothing to see here!</p>
				<p class="text-body-secondary mb-4">
					The page you're looking for doesn't exist.
				</p>
				<a href="/" class="btn btn-primary mb-4">
					<svg class="bi" role="img">
						<use href="/icons.svg#bi-arrow-left"></use>
					</svg>
					Go Back Home
				</a>
			</div>
		</main>

		<script type="module" src="/src/ts/main.ts"></script>
	</body>
</html>
